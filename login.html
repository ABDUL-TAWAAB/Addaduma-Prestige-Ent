<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./CSS/login.css">
     <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="container">
         <form method="post">
            <div class="logo">
                <img src="./multimedia/logo.png" alt="logo here">
                <h5>Addaduma Enterprise</h5>
            </div>

            <h1>Welcome Back</h1>

            <div class="form-field">

                <div class="section-box">
                    <label for="email">Email Address</label>
                    <div class="input-box">
                        <input type="email" placeholder="example@gmail.com" required>
                        <i class="bx bx-envelope"></i>
                    </div>
                </div>

                <div class="section-box">
                    <label for="password">Password</label>

                    <div class="input-box">
                        <input type="password" placeholder="Enter password" required>
                        <i class="bx bx-eye-slash"></i>
                    </div>
                </div>

                <button type="submit">Login</button>
            </div>
            <p>Don't have an account? <a href="register.html">Register</a></p>

        </form>

         <section>
            <div class="top-caption">
                <div class="top-logo">
                    <img src="./multimedia/logo.png" alt="logo">
                <h5>Addaduma Prestige Enterprise</h5>
                </div>
                <p>We've got tips and tooks to keep you home while purchase your goods online</p>
            </div>

            <div class="image-container">
                <img src="./multimedia/whole-logo.jpg" alt="">
            </div>
         </section>
    </div>
    
</body>
</html>
